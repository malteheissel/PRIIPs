<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My first public website</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f2f2f2;
      color: #222;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 40px 32px;
      text-align: center;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.15;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.125rem);
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 32px 20px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>My first public website</h1>
    <p>This is a simple HTML website created with Codex.</p>
  </main>
</body>
</html>
